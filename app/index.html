<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PocketShell</title>
    <!-- PWA: installable on mobile Chrome (manifest + /sw.js registered in main.ts) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0d13" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <!-- iOS does not read the manifest; these keep "Add to Home Screen" decent there too -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PocketShell" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script>
      // Apply the persisted theme + language before first paint (FOUC guard).
      // Mirrors app/src/lib/theme.ts + app/src/lib/settings.ts — keep the
      // storage key and logic in sync.
      (function () {
        var pref = "dark";
        var lang = "";
        try {
          var s = JSON.parse(localStorage.getItem("ps.settings") || "{}");
          if (s.theme === "dark" || s.theme === "light" || s.theme === "system") pref = s.theme;
          if (s.language === "zh" || s.language === "en") lang = s.language;
        } catch (e) {}
        var resolved = pref === "system"
          ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : pref;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.background = resolved === "light" ? "#f5f5f2" : "#0a0d13";
        if (!lang) lang = (navigator.language || "").toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
        document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      })();
    </script>
  </head>
  <body style="margin:0">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
